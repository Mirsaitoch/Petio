services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: petio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-dashboard.json:/etc/grafana/provisioning/dashboards/petio.json
    depends_on:
      - prometheus

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/petio?sslmode=disable
      YANDEX_AI_API_KEY: ${YANDEX_AI_API_KEY}
      YANDEX_AI_FOLDER_ID: ${YANDEX_AI_FOLDER_ID}
      JWT_SECRET: ${JWT_SECRET}
      S3_BUCKET: ${S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - postgres
      - prometheus

  triton:
    build:
      context: ./triton
      dockerfile: Dockerfile
    ports:
      - "8010:8000"
      - "8011:8001"
      - "8012:8002"
    env_file:
      - ./triton/.env
    volumes:
      - triton_models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 360s


  moderation_api:
    build:
      context: ./moderation_service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      TRITON_URL: "triton:8001"
      TRITON_HTTP_URL: "http://triton:8000"
      TOKENIZERS_PATH: "/app/tokenizers"
    depends_on:
      triton:
        condition: service_healthy

