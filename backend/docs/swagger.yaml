basePath: /
definitions:
  domain.Article:
    properties:
      careType:
        type: string
      category:
        type: string
      description:
        type: string
      id:
        type: string
      image:
        type: string
      petType:
        type: string
      readTime:
        type: string
      title:
        type: string
    type: object
  domain.Comment:
    properties:
      author:
        type: string
      avatar:
        type: string
      content:
        type: string
      id:
        type: string
      timestamp:
        type: string
    type: object
  domain.HealthDiaryEntry:
    properties:
      date:
        type: string
      id:
        type: string
      note:
        type: string
      petId:
        type: string
    type: object
  domain.Pet:
    properties:
      age:
        type: string
      birthDate:
        type: string
      breed:
        type: string
      features:
        items:
          type: string
        type: array
      id:
        type: string
      name:
        type: string
      photo:
        type: string
      species:
        type: string
      vaccinations:
        items:
          $ref: '#/definitions/domain.Vaccination'
        type: array
      weight:
        type: number
    type: object
  domain.Post:
    properties:
      author:
        type: string
      avatar:
        type: string
      club:
        type: string
      comments:
        items:
          $ref: '#/definitions/domain.Comment'
        type: array
      content:
        type: string
      id:
        type: string
      image:
        type: string
      liked:
        type: boolean
      likes:
        type: integer
      timestamp:
        type: string
    type: object
  domain.Reminder:
    properties:
      completed:
        type: boolean
      date:
        type: string
      id:
        type: string
      petId:
        type: string
      petName:
        type: string
      time:
        type: string
      title:
        type: string
      type:
        $ref: '#/definitions/domain.ReminderType'
    type: object
  domain.ReminderType:
    enum:
    - feeding
    - vaccination
    - deworming
    - grooming
    type: string
    x-enum-varnames:
    - ReminderFeeding
    - ReminderVaccination
    - ReminderDeworming
    - ReminderGrooming
  domain.UserProfile:
    properties:
      avatar:
        type: string
      bio:
        type: string
      joinDate:
        type: string
      name:
        type: string
      petsCount:
        type: integer
      postsCount:
        type: integer
      username:
        type: string
    type: object
  domain.Vaccination:
    properties:
      date:
        type: string
      id:
        type: string
      name:
        type: string
      nextDate:
        type: string
    type: object
  domain.WeightRecord:
    properties:
      date:
        type: string
      weight:
        type: number
    type: object
host: localhost:8080
info:
  contact: {}
  description: API приложения для ухода за домашними животными
  title: Petio API
  version: "1.0"
paths:
  /v1/articles:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Article'
            type: array
      security:
      - BearerAuth: []
      summary: Список статей
      tags:
      - articles
    post:
      consumes:
      - application/json
      parameters:
      - description: статья
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.Article'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Article'
      security:
      - BearerAuth: []
      summary: Создать статью
      tags:
      - articles
  /v1/articles/{id}:
    delete:
      parameters:
      - description: ID статьи
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Удалить статью
      tags:
      - articles
    get:
      parameters:
      - description: ID статьи
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Article'
        "404":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Получить статью по ID
      tags:
      - articles
    put:
      consumes:
      - application/json
      parameters:
      - description: ID статьи
        in: path
        name: id
        required: true
        type: string
      - description: данные
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.Article'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Article'
      security:
      - BearerAuth: []
      summary: Обновить статью
      tags:
      - articles
  /v1/auth/login:
    post:
      consumes:
