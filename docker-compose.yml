services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    # Переменные S3 (S3_BUCKET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY) берутся из backend/.env
    env_file:
      - backend/.env
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/petio?sslmode=disable"
      JWT_SECRET: "petio-jwt-secret-change-in-prod"
      S3_REGION: "ru-central1"
      S3_ENDPOINT: "https://storage.yandexcloud.net"
    depends_on:
      postgres:
        condition: service_healthy
        
  moderation_api:
    build:
      context: ./moderation_service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/petio?sslmode=disable"

volumes:
  postgres_data:
