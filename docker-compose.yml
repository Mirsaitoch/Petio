services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 5

  triton:
    build:
      context: ./triton
      dockerfile: Dockerfile
    ports:
      - "8010:8000"
      - "8011:8001"
      - "8012:8002"
    env_file:
      - ./triton/.env
    volumes:
      - triton_models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 360s


  moderation_api:
    build:
      context: ./moderation_service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      TRITON_URL: "triton:8001"
      TRITON_HTTP_URL: "http://triton:8000"
      TOKENIZERS_PATH: "/app/tokenizers"
    depends_on:
      triton:
        condition: service_healthy

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/petio?sslmode=disable"
      JWT_SECRET: "petio-jwt-secret-change-in-prod"
      S3_REGION: "ru-central1"
      S3_ENDPOINT: "https://storage.yandexcloud.net"
      MODERATION_API_URL: "http://moderation_api:8000"
    depends_on:
      postgres:
        condition: service_healthy
      moderation_api:
        condition: service_started

volumes:
  postgres_data:
  triton_models: